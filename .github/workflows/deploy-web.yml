name: Deploy web to GitHub Pages

# Manual-trigger only — surface the workflow under the repo's
# Actions tab and let a maintainer click "Run workflow" when they
# want to publish the current main to xbusx.bimmerz.app. No
# push-to-main auto-deploy by design; the site shouldn't move on
# every commit.
on:
  workflow_dispatch:

# Required by `actions/deploy-pages`: read the repo, write the
# Pages artifact, and mint an OIDC token so the deployment is
# attested to come from this workflow run.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time — let an in-flight deploy finish
# rather than cancelling it (cancelling mid-deploy leaves Pages in a
# half-published state).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build the web app and everything it depends on. The `...`
      # suffix is pnpm-filter syntax for "this package plus its
      # workspace deps", so CI doesn't waste time building unrelated
      # packages.
      - name: Build
        run: pnpm --filter @emdzej/ibusx-web... build

      # GitHub Pages binds the custom subdomain via a `CNAME` file at
      # the site root. Without it the DNS resolves but Pages 404s
      # because it doesn't know which repo to serve. Plain text, no
      # trailing newline needed.
      - name: Add CNAME
        run: echo "xbusx.bimmerz.app" > apps/web/dist/CNAME

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
